name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Set up JDK 17
        uses: actions/setup-java@v5.4.0
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build with Maven
        run: mvn compile test --no-transfer-progress
