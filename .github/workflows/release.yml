name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v1.3.2)'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      attestations: write
      id-token: write

    steps:
      - uses: actions/checkout@v7.0.0

      - name: Set up JDK 17
        uses: actions/setup-java@v5.4.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build shaded jar
        run: mvn -B package --file pom.xml

      - name: Verify shaded jar
        run: |
          JAR_FILE=$(ls target/*.jar | head -1)
          echo "Artifact: $JAR_FILE"
          unzip -l "$JAR_FILE" | head -30

      - name: Generate checksums
        run: |
          cd target
          for f in *.jar; do
            sha256sum "$f" > "$f.sha256"
          done

      - name: Upload release artifacts
        if: github.event_name == 'release'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" target/*.jar

      - name: Create release on workflow_dispatch
        if: github.event_name == 'workflow_dispatch'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.event.inputs.tag }}" \
            --title "${{ github.event.inputs.tag }}" \
            --generate-notes \
            target/*.jar

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ManualTournaments-shaded-jar
          path: target/*.jar
          retention-days: 90
