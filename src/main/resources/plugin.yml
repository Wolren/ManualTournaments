main: net.flex.ManualTournaments.Main
name: ManualTournaments
version: 1.5
description: Plugin you can use to make manual tournaments
api-version: 1.13
load: POSTWORLD
author: Wolren
softdepend: [PlaceholderAPI]
website: ""
commands:
  manualtournaments_arena:
    aliases:
      - mt_arena
      - mta
      - arena
    permission: mt.arena
    permission-message: "You don't have permission to use this command"
    usage: "Usage: /arena [list|create|gui...]"
  manualtournaments_fight:
    aliases:
      - mt_fight
      - mtf
      - fight
    permission: mt.fight
    permission-message: "You don't have permission to use this command"
    usage: "Usage: /fight {type} [player1] [player2]..."
  manualtournaments_fight_arena:
      aliases:
        - mt_fight_arena
        - mtfa
        - fight_arena
      permission: mt.fight
      permission-message: "You don't have permission to use this command"
      usage: "Usage: /fight {type} {arena} [player1] [player2]..."
  manualtournaments_kit:
    aliases:
      - mt_kit
      - mtk
      - kit
    permission: mt.kit
    permission-message: "You don't have permission to use this command"
    usage: "Usage: /kit [kit name] / [list|create|gui...]"
  manualtournaments_reload:
    aliases:
      - mt_reload
      - mtr
    permission: mt.reload
    permission-message: "You don't have permission to use this command"
    usage: "Usage: /mtr reload"
  manualtournaments_settings:
    aliases:
      - mt_settings
      - mts
      - settings
    permission: mt.settings
    permission-message: "You don't have permission to use this command"
    usage: "Usage: /settings [current_arena|current_kit...]"
  manualtournaments_spectate:
    aliases:
      - mt_spectate
      - mt_spec
      - spec
      - spectate
    permission: mt.spectate
    permission-message: "You don't have permission to use this command"
    usage: "Usage: /spectate"
  manualtournaments_queue:
    aliases:
      - mt_queue
      - queue
      - enlist
    permission: mt.queue
    permission-message: "You don't have permission to use this command"
    usage: "Usage: /enlist"
  manualtournaments_tournament:
    aliases:
      - mt_tournament
      - mtt
      - tournament
    permission: mt.tournament
    permission-message: "You don't have permission to use this command"
    usage: "Usage: /tournament <create|join|leave|start|cancel|info|list|set|bracket>"
permissions:
  mt.arena:
    description: Allows for creating and managing arenas
    default: false
  mt.fight:
    description: Allows for starting the fight between players
    default: false
  mt.kit:
    description: Allows for creating and managing kits
    default: false
  mt.settings:
    description: Allows for changing settings
    default: false
  mt.spectate:
    description: Allows for spectating arenas
    default: true
  mt.queue:
    description: Allows for spectating arenas
    default: true
  mt.tournament:
    description: Allows joining and viewing tournaments
    default: true
  mt.tournament.admin:
    description: Allows creating, starting, cancelling tournaments
    default: op
  mt.tournament.create:
    description: Create tournaments
    default: op
  mt.tournament.delete:
    description: Delete tournaments
    default: op
  mt.tournament.cancel:
    description: Cancel running tournaments
    default: op
  mt.tournament.pause:
    description: Pause/resume tournaments
    default: op
  mt.tournament.forceadvance:
    description: Force-advance bracket matches
    default: op
  mt.tournament.forcestart:
    description: Force-start a tournament
    default: op
  mt.tournament.set:
    description: Modify tournament settings (arena, kit, maxplayers, etc.)
    default: op
  mt.tournament.setprize:
    description: Manage tournament prize commands
    default: op
  mt.tournament.reload:
    description: Reload tournament data from disk
    default: op
  mt.tournament.substitute:
    description: Substitute players in tournaments
    default: op
  mt.tournament.kick:
    description: Kick players from tournaments
    default: op
  mt.tournament.join:
    description: Join tournaments
    default: true
  mt.tournament.leave:
    description: Leave tournaments
    default: true
  mt.tournament.spectate:
    description: Spectate tournament matches
    default: true
  mt.tournament.info:
    description: View tournament info and history
    default: true
  mt.tournament.bracket:
    description: Open bracket GUI
    default: true
  mt.tournament.list:
    description: List tournaments
    default: true
  mt.tournament.stats:
    description: View tournament statistics
    default: true
  mt.tournament.confirm:
    description: Confirm destructive actions
    default: true
  mt.*:
    description: Permission allowing using all ManualTournaments commands
    children:
      mt.arena: true
      mt.fight: true
      mt.kit: true
      mt.settings: true
      mt.spectate: true
      mt.reload: true
      mt.queue: true
      mt.tournament: true
      mt.tournament.admin: true
      mt.tournament.create: true
      mt.tournament.delete: true
      mt.tournament.cancel: true
      mt.tournament.pause: true
      mt.tournament.forceadvance: true
      mt.tournament.forcestart: true
      mt.tournament.set: true
      mt.tournament.setprize: true
      mt.tournament.reload: true
      mt.tournament.substitute: true
      mt.tournament.kick: true
      mt.tournament.join: true
      mt.tournament.leave: true
      mt.tournament.spectate: true
      mt.tournament.info: true
      mt.tournament.bracket: true
      mt.tournament.list: true
      mt.tournament.stats: true
      mt.tournament.confirm: true